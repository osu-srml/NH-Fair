program: python -m release_benchmark.cli.train
command:
- ${env}
- python
- -m
- release_benchmark.cli.train
- ${args}
- --method
- clip_fairer
method: bayes
metric:
  name: Validation loss
  goal: minimize
parameters:
  lr:
    values:
    - 0.0
  weight_decay:
    values:
    - 0.0
  bs:
    values:
    - 256
  epochs:
    values:
    - 1
  optim:
    values:
    - sgd
  pretrain:
    values:
    - 1
  augment:
    values:
    - weak
  seed:
    values:
    - 42
  use_clip:
    values:
    - 1
  clipfairer_tau_z_i:
    distribution: uniform
    min: 0.0
    max: 1.0
  clipfairer_tau_i:
    distribution: uniform
    min: 0.0
    max: 1.0
  clipfairer_tau_t:
    distribution: uniform
    min: 0.0
    max: 1.0
  clipfairer_tau_z_t:
    distribution: uniform
    min: 0.0
    max: 1.0
  clipfairer_rff_dim:
    values:
    - 1000
    - 2000
    - 3000
    - 4000
    - 8000
  clipfairer_sigma_max:
    values:
    - 4000
  clipfairer_gamma_i:
    values:
    - 3e-5
  clipfairer_gamma_t:
    values:
    - 3e-4
