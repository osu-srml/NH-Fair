program: python -m release_benchmark.cli.train
command:
- ${env}
- python
- -m
- release_benchmark.cli.train
- ${args}
- --method
- clip_sfid
method: bayes
metric:
  name: Validation loss
  goal: minimize
parameters:
  lr:
    values:
    - 0.0
  weight_decay:
    values:
    - 0.0
  bs:
    values:
    - 256
  epochs:
    values:
    - 1
  optim:
    values:
    - sgd
  pretrain:
    values:
    - 1
  augment:
    values:
    - weak
  seed:
    values:
    - 42
  use_clip:
    values:
    - 1
  sfid_threshold:
    distribution: uniform
    min: 0.5
    max: 1.0
  sfid_image_prune_num:
    values:
    - 50
    - 75
    - 100
