program: python -m release_benchmark.cli.train
command:
- ${env}
- python
- -m
- release_benchmark.cli.train
- ${args}
- --method
- erm
method: bayes
metric:
  name: Validation loss
  goal: minimize
parameters:
  lr:
    distribution: log_uniform_values
    min: 1.0e-05
    max: 0.01
  weight_decay:
    values:
    - 1e-4
    - 1e-3
    - 1e-2
    - 1e-5
    - 0.0
  bs:
    values:
    - 256
  epochs:
    values:
    - 100
  optim:
    values:
    - sgd
    - adam
  pretrain:
    values:
    - 1
  augment:
    values:
    - weak
  seed:
    values:
    - 42
  # Momentum: train default is 0.9; not swept here. Uncomment below to search over momentum.
  # momentum:
  #   distribution: uniform
  #   min: 0.5
  #   max: 0.99
