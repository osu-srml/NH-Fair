program: python -m release_benchmark.cli.train
command:
- ${env}
- python
- -m
- release_benchmark.cli.train
- ${args}
- --method
- oxonfair_method
method: grid
metric:
  name: Validation loss
  goal: minimize
parameters:
  lr:
    values:
    - 0
  weight_decay:
    values:
    - 0
  bs:
    values:
    - 256
  epochs:
    values:
    - 1
  optim:
    values:
    - adam
  pretrain:
    values:
    - 1
  augment:
    values:
    - weak
  seed:
    values:
    - 42
  oxonfair_mode:
    values:
    - accuracy_noharm
    - minmax_fairness
    - diff_min
    - eqodd_acc
    - dp_acc
