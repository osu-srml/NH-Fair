program: python -m release_benchmark.cli.train
command:
- ${env}
- python
- -m
- release_benchmark.cli.train
- ${args}
- --method
- dfr
method: grid
metric:
  name: Validation loss
  goal: minimize
parameters:
  lr:
    values:
    - 0
  weight_decay:
    values:
    - 0
  bs:
    values:
    - 256
  epochs:
    values:
    - 1
  optim:
    values:
    - adam
  pretrain:
    values:
    - 1
  augment:
    values:
    - weak
  seed:
    values:
    - 42
  dfr_notrain_val:
    values:
    - 0
    - 1
  dfr_tune_class_weights_train:
    values:
    - 0
    - 1
  dfr_ref:
    values:
    - l1
    - l2
  dfr_mode:
    values:
    - validation
    - train
