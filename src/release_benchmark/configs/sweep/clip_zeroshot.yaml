program: python -m release_benchmark.cli.zeroshot
command:
- ${env}
- python
- -m
- release_benchmark.cli.zeroshot
- ${args}
- --method
- clip
- --image_direct
method: grid
metric:
  name: Validation loss
  goal: minimize
parameters:
  lr:
    values:
    - 5e-4
  weight_decay:
    values:
    - 1e-4
  bs:
    values:
    - 256
  epochs:
    values:
    - 100
  optim:
    values:
    - adam
  pretrain:
    values:
    - 1
  augment:
    values:
    - weak
  seed:
    values:
    - 42
  use_clip:
    values:
    - 1
